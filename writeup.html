<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writeup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="writeup.css" />
</head>
<body>
  <header class="nav-wrapper">
    <div class="navbar-pill">
      <div class="logo">MyBrand</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="#writeup">Writeup</a>
      </nav>
    </div>
  </header>

  <section class="hero" id="home">
    <div class="hero-content hero-content--score">
      <div class="hero-text hero-text--score">
        <p class="eyebrow">Writeup</p>
        <h1>Progress Writeup</h1>
        <div class="hero-actions">
          <a href="index.html" id="ctaBtn" class="hero-link">Back to Home</a>
        </div>
      </div>

      <div class="score-card">
        <div class="score-card__header">
          <div>
            <p class="score-card__label">Writeup Score</p>
            <h3>CTF Progress</h3>
          </div>
          <div class="score-card__value">84%</div>
        </div>

        <div class="score-chart" aria-label="Grafik progres writeup">
          <svg id="progressChart" viewBox="0 0 320 140" role="img"></svg>
        </div>

        <div class="score-stats">
          <div>
            <span class="score-stats__label">Solved</span>
            <strong>12</strong>
          </div>
          <div>
            <span class="score-stats__label">Pending</span>
            <strong>2</strong>
          </div>
          <div>
            <span class="score-stats__label">Streak</span>
            <strong>7d</strong>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="writeup-section" id="writeup">
    <div class="writeup-shell">
      <div class="writeup-card">
        <div class="section-title">
          <p class="eyebrow">Writeup</p>
          <h2>Daftar challenge CTF</h2>
        </div>
        <div id="writeupTableContainer" class="writeup-table-container">
          <div class="writeup-empty">Memuat data writeup...</div>
        </div>
      </div>
    </div>
  </section>

  <script src="writeup.js"></script>
</body>
</html>
